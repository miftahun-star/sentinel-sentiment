    body.light .border-white\/\[0.05\],
    body.light .border-white\/\[0.06\],
    body.light .border-white\/\[0.08\],
    body.light .border-white\/\[0.03\],
    body.light .border-white\/\[0.02\],
    body.light .border-zinc-800 {

    body.light select,
    body.light input,
    body.light textarea {

<body class="relative min-h-screen overflow-x-hidden">
  <div class="absolute inset-0 pointer-events-none mv-grid-bg opacity-40"></div>
  <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-green-500/5 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute top-1/3 right-1/4 w-[600px] h-[600px] bg-orange-500/5 rounded-full blur-[120px] pointer-events-none"></div>

  <div id="root"></div>

  <!-- React JSX App Script -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ALL_ASSETS = [
      // Cryptos (Real Bybit)
      { id: 'BTC', name: 'Bitcoin', symbol: 'BTCUSDT', type: 'crypto', apiSymbol: 'BTCUSDT' },
      { id: 'ETH', name: 'Ethereum', symbol: 'ETHUSDT', type: 'crypto', apiSymbol: 'ETHUSDT' },
      { id: 'SOL', name: 'Solana', symbol: 'SOLUSDT', type: 'crypto', apiSymbol: 'SOLUSDT' },
      { id: 'HYPE', name: 'Hyperliquid', symbol: 'HYPEUSDT', type: 'crypto', apiSymbol: 'HYPEUSDT' },
      { id: 'ASTER', name: 'Aster DEX', symbol: 'ASTERUSDT', type: 'crypto', apiSymbol: 'ASTERUSDT' },
      { id: 'LTC', name: 'Litecoin', symbol: 'LTCUSDT', type: 'crypto', apiSymbol: 'LTCUSDT' },
      { id: 'XRP', name: 'Ripple', symbol: 'XRPUSDT', type: 'crypto', apiSymbol: 'XRPUSDT' },
      { id: 'DOGE', name: 'Dogecoin', symbol: 'DOGEUSDT', type: 'crypto', apiSymbol: 'DOGEUSDT' },
      { id: 'LINK', name: 'Chainlink', symbol: 'LINKUSDT', type: 'crypto', apiSymbol: 'LINKUSDT' },
      { id: 'TRX', name: 'Tron', symbol: 'TRXUSDT', type: 'crypto', apiSymbol: 'TRXUSDT' },
      
      // XAU (Gold) (Yahoo Finance)
      { id: 'XAU', name: 'Gold Spot', symbol: 'XAUUSD', type: 'forex', apiSymbol: 'GC=F' },
      
      // Indices (Yahoo Finance)
      { id: 'USA30', name: 'US Wall St 30', symbol: 'USA30', type: 'forex', apiSymbol: 'YM=F' },
      { id: 'USA100', name: 'US Tech 100', symbol: 'USA100', type: 'forex', apiSymbol: 'NQ=F' },
      { id: 'USA500', name: 'US 500', symbol: 'USA500', type: 'forex', apiSymbol: 'ES=F' },
      { id: 'UK100', name: 'UK 100', symbol: 'UK100', type: 'forex', apiSymbol: '^FTSE' },
      { id: 'JPN225', name: 'Japan 225', symbol: 'JPN225', type: 'forex', apiSymbol: '^N225' },
      { id: 'SPA35', name: 'Spain 35', symbol: 'SPA35', type: 'forex', apiSymbol: '^IBEX' },
      
      // Forex (Yahoo Finance)
      { id: 'EURUSD', name: 'Euro / US Dollar', symbol: 'EURUSD', type: 'forex', apiSymbol: 'EURUSD=X' },
      { id: 'GBPUSD', name: 'British Pound / US Dollar', symbol: 'GBPUSD', type: 'forex', apiSymbol: 'GBPUSD=X' },
      { id: 'USDJPY', name: 'US Dollar / Japanese Yen', symbol: 'USDJPY', type: 'forex', apiSymbol: 'USDJPY=X' },
      { id: 'AUDUSD', name: 'Australian Dollar / US Dollar', symbol: 'AUDUSD', type: 'forex', apiSymbol: 'AUDUSD=X' },
      { id: 'USDCAD', name: 'US Dollar / Canadian Dollar', symbol: 'USDCAD', type: 'forex', apiSymbol: 'USDCAD=X' },
      { id: 'USDCHF', name: 'US Dollar / Swiss Franc', symbol: 'USDCHF', type: 'forex', apiSymbol: 'USDCHF=X' },
      { id: 'NZDUSD', name: 'New Zealand Dollar / US Dollar', symbol: 'NZDUSD', type: 'forex', apiSymbol: 'NZDUSD=X' },
      { id: 'EURGBP', name: 'Euro / British Pound', symbol: 'EURGBP', type: 'forex', apiSymbol: 'EURGBP=X' },
      { id: 'EURJPY', name: 'Euro / Japanese Yen', symbol: 'EURJPY', type: 'forex', apiSymbol: 'EURJPY=X' },
      { id: 'GBPJPY', name: 'British Pound / Japanese Yen', symbol: 'GBPJPY', type: 'forex', apiSymbol: 'GBPJPY=X' }
    ];

    const TIMEFRAMES = ['M1', 'M5', 'M15', 'M30', 'H1', 'H2', 'H3', 'H4', 'D1', 'W1', '1M'];

    const STATUS_FILTERS = [
      { key: 'ALL', label: 'All Status' },
      { key: 'HEALTHY', label: 'Healthy' },
      { key: 'TRAPPED_LONG', label: 'Trapped Long' },
      { key: 'TRAPPED_SHORT', label: 'Trapped Short' },
      { key: 'EXTREME_LONG', label: 'Extreme Long' },
      { key: 'EXTREME_SHORT', label: 'Extreme Short' }
    ];

    const BIAS_FILTERS = [
      { key: 'ALL', label: 'All Biases' },
      { key: 'STRONG_BULLISH', label: 'Strong Bullish' },
      { key: 'BULLISH', label: 'Bullish' },
      { key: 'NEUTRAL', label: 'Neutral' },
      { key: 'BEARISH', label: 'Bearish' },
      { key: 'STRONG_BEARISH', label: 'Strong Bearish' }
    ];

    function getContrarianBias(buyRatio) {
      const sellRatio = 1 - buyRatio;
      if (buyRatio > 0.70) return 'STRONG_BEARISH';
      if (buyRatio > 0.58) return 'BEARISH';
      if (sellRatio > 0.70) return 'STRONG_BULLISH';
      if (sellRatio > 0.58) return 'BULLISH';
      return 'NEUTRAL';
    }

    function checkMarketOpen(assetType) {
      if (assetType === 'crypto') return true;
      const now = new Date();
      const day = now.getUTCDay(); 
      const hour = now.getUTCHours();
      if (day === 5 && hour >= 22) return false;
      if (day === 6) return false;
      if (day === 0 && hour < 22) return false;
      return true;
    }

    const MARKET_STATE_FILTERS = [
      { key: 'ALL', label: 'All Sessions' },
      { key: 'OPEN', label: 'Market Open' },
      { key: 'CLOSED', label: 'Market Closed' }
    ];

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem('sentinel_theme') || 'dark');
      const [activeMainTab, setActiveMainTab] = useState('sentiment');
      const [selectedTimeframe, setSelectedTimeframe] = useState('H1');
      const [marketData, setMarketData] = useState({});
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [activeAsset, setActiveAsset] = useState(null);
      const [customTimeframes, setCustomTimeframes] = useState({});

      useEffect(() => {
        localStorage.setItem('sentinel_theme', theme);
        if (theme === 'light') {
          document.body.classList.add('light');
        } else {
          document.body.classList.remove('light');
        }
      }, [theme]);
      const [serverConnected, setServerConnected] = useState(true);
      const [newsList, setNewsList] = useState([]);
      const [isNewsLoading, setIsNewsLoading] = useState(false);

      const [activeStatusFilter, setActiveStatusFilter] = useState('ALL');
      const [activeBiasFilter, setActiveBiasFilter] = useState('ALL');
      const [activeMarketStateFilter, setActiveMarketStateFilter] = useState('ALL');
      const [showAssetConfig, setShowAssetConfig] = useState(false);

      const fetchNews = async () => {
        setIsNewsLoading(true);
        try {
          const res = await fetch('/api/news');
          if (res.ok) {
            const json = await res.json();
            setNewsList(json.news || []);
          }
        } catch (err) {
          console.error("Failed to fetch news:", err.message);
        } finally {
          setTimeout(() => setIsNewsLoading(false), 500);
        }
      };
      
      const [activeAssetsList, setActiveAssetsList] = useState(() => {
        try {
          const saved = localStorage.getItem('sentinel_active_assets');
          if (saved) return JSON.parse(saved);
        } catch (_) {}
        return ALL_ASSETS.map(a => a.id);
      });

      useEffect(() => {
        localStorage.setItem('sentinel_active_assets', JSON.stringify(activeAssetsList));
      }, [activeAssetsList]);

      const fetchAllData = async (timeframe) => {
        setLoading(true);
        const newData = { ...marketData };
        const targetAssets = ALL_ASSETS.filter(a => activeAssetsList.includes(a.id));

        if (targetAssets.length === 0) {
          setLoading(false);
          return;
        }

        try {
          await Promise.all(targetAssets.map(async (asset) => {
            const activeTf = customTimeframes[asset.id] || timeframe;
            const apiPath = asset.type === 'crypto' ? '/api/sentiment/crypto' : '/api/sentiment/forex';
            const url = `${apiPath}?symbol=${asset.apiSymbol}&period=${activeTf}`;
            
            try {
              const res = await fetch(url);
              if (!res.ok) throw new Error(`HTTP error ${res.status}`);
              const json = await res.json();
              newData[asset.id] = { ...asset, ...json, lastUpdated: Date.now(), activeTf };
            } catch (err) {
              console.error(`Error fetching ${asset.id}:`, err.message);
              newData[asset.id] = { ...createMockData(asset, activeTf), activeTf };
            }
          }));
          
          setMarketData(newData);
          setServerConnected(true);
        } catch (err) {
          setError('Gagal menghubungkan ke proxy server.');
          setServerConnected(false);
        } finally {
          setLoading(false);
        }
      };

      const fetchSingleAssetData = async (asset, tf) => {
        const apiPath = asset.type === 'crypto' ? '/api/sentiment/crypto' : '/api/sentiment/forex';
        const url = `${apiPath}?symbol=${asset.apiSymbol}&period=${tf}`;
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP error ${res.status}`);
          const json = await res.json();
          setMarketData(prev => ({
            ...prev,
            [asset.id]: { ...asset, ...json, lastUpdated: Date.now(), activeTf: tf }
          }));
        } catch (err) {
          console.error(`Error fetching single ${asset.id}:`, err.message);
          setMarketData(prev => ({
            ...prev,
            [asset.id]: { ...createMockData(asset, tf), activeTf: tf }
          }));
        }
      };

      const createMockData = (asset, timeframe) => {
        const mockPrice = asset.type === 'crypto' ? (asset.id === 'BTC' ? 96500 : asset.id === 'ETH' ? 3420 : 158) : (asset.id === 'XAU' ? 2324 : 1.085);
        const randomChange = (Math.random() * 4 - 2).toFixed(2);
        const buyRatio = parseFloat((0.3 + Math.random() * 0.4).toFixed(4));
        const sellRatio = parseFloat((1 - buyRatio).toFixed(4));
        
        let status = 'HEALTHY';
        if (buyRatio > 0.65) status = 'TRAPPED_LONG';
        else if (sellRatio > 0.65) status = 'TRAPPED_SHORT';

        const candles = [];
        let price = mockPrice;
        for (let i = 0; i < 30; i++) {
          const change = (Math.random() - 0.5) * (price * 0.01);
          candles.push({
            time: Date.now() - (30 - i) * 60000,
            open: price,
            high: price + Math.abs(change) * 1.2,
            low: price - Math.abs(change) * 1.2,
            close: price + change
          });
          price += change;
        }

        const mockFib = {
          isUptrend: true,
          highest: mockPrice * 1.02,
          lowest: mockPrice * 0.98,
          levels: {
            '0.000': mockPrice * 1.02,
            '0.236': mockPrice * 1.01,
            '0.382': mockPrice * 1.005,
            '0.500': mockPrice,
            '0.618': mockPrice * 0.995,
            '0.786': mockPrice * 0.985,
            '1.000': mockPrice * 0.98,
            '-0.272': mockPrice * 1.03,
            '-0.618': mockPrice * 1.045
          }
        };

        return {
          ...asset,
          price: mockPrice,
          change24h: parseFloat(randomChange),
          buyRatio,
          sellRatio,
          status,
          candles,
          indicators: { 
            rsi: 50, 
            percentB: 0.5, 
            sma20: mockPrice,
            ema50: mockPrice,
            upperBand: mockPrice * 1.02,
            lowerBand: mockPrice * 0.98,
            stochastic: { k: 45, d: 43 },
            macd: { macd: 0.02, signal: 0.015, histogram: 0.005 },
            ichimoku: { tenkan: mockPrice, kijun: mockPrice, spanA: mockPrice, spanB: mockPrice },
            fibonacci: mockFib
          },
          isMock: true
        };
      };

      useEffect(() => {
        fetchAllData(selectedTimeframe);
      }, [selectedTimeframe, activeAssetsList]);

      useEffect(() => {
        fetchNews();
        const interval = setInterval(fetchNews, 180000);
        return () => clearInterval(interval);
      }, []);

      const toggleAsset = (id) => {
        if (activeAssetsList.includes(id)) {
          setActiveAssetsList(activeAssetsList.filter(a => a !== id));
        } else {
          setActiveAssetsList([...activeAssetsList, id]);
        }
      };

      const getFilteredAssets = () => {
        return ALL_ASSETS.filter(asset => {
          if (!activeAssetsList.includes(asset.id)) return false;
          
          const data = marketData[asset.id];
          if (!data) {
            return activeStatusFilter === 'ALL' && activeBiasFilter === 'ALL' && activeMarketStateFilter === 'ALL';
          }
          
          if (activeStatusFilter !== 'ALL' && data.status !== activeStatusFilter) {
            return false;
          }
          
          if (activeBiasFilter !== 'ALL') {
            const assetBias = getContrarianBias(data.buyRatio);
            if (assetBias !== activeBiasFilter) return false;
          }

          if (activeMarketStateFilter !== 'ALL') {
            const isOpen = checkMarketOpen(asset.type);
            const filterOpen = activeMarketStateFilter === 'OPEN';
            if (isOpen !== filterOpen) return false;
          }
          
          return true;
        });
      };

      const filteredAssets = getFilteredAssets();
      const trappedCount = Object.values(marketData).filter(
        a => a.status === 'TRAPPED_LONG' || a.status === 'TRAPPED_SHORT'
      ).length;
      const strongContrarians = Object.values(marketData).filter(
        a => a.buyRatio > 0.70 || a.sellRatio > 0.70
      );      return (
        <div class="relative z-10 mx-auto max-w-7xl px-4 py-8 md:px-6">
          {/* Header */}
          <header class="flex flex-col gap-4 border-b border-white/[0.08] pb-6 md:flex-row md:items-center md:justify-between">
            <div>
              <div class="flex items-center gap-3">
                <span class="rounded-full bg-green-500/10 px-3 py-1 text-xs font-bold uppercase tracking-wider text-green-400 border border-green-500/20 glow-green">
                  Live Terminal
                </span>
                <span class={`flex h-2 w-2 rounded-full ${serverConnected ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></span>
                <span class="text-xs text-zinc-400 font-mono">
                  {serverConnected ? 'Connected via Node Proxy' : 'Offline Mode (Simulated Data)'}
                </span>
              </div>
              <h1 class="mt-3 font-heading text-3xl font-bold tracking-tight text-white md:text-4xl">
                Sentinel Sentiment
              </h1>
              <p class="mt-2 text-sm text-zinc-400 max-w-xl">
                Analisis sentimen retail secara terperinci. Cari peluang contrarian dari posisi retail yang terjebak (*trapped*) di berbagai *timeframe*.
              </p>
            </div>

            {/* Timeframe Selector & Theme Switcher */}
            <div class="flex items-center gap-3 self-start md:self-center">
              <div class="flex items-center gap-2 rounded-xl border border-white/[0.08] bg-zinc-950/80 p-1.5 backdrop-blur-md">
                <span class="text-[10px] font-bold text-zinc-400 uppercase font-mono px-2">Global TF:</span>
                <select
                  value={selectedTimeframe}
                  onChange={(e) => setSelectedTimeframe(e.target.value)}
                  class="rounded-lg bg-zinc-900 border border-white/10 px-3 py-1.5 text-xs font-bold text-green-400 outline-none focus:border-green-500 font-mono cursor-pointer"
                >
                  {TIMEFRAMES.map(tf => (
                    <option key={tf} value={tf} class="bg-zinc-950 text-white">{tf}</option>
                  ))}
                </select>
              </div>

              <button
                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                class="flex h-10 w-10 items-center justify-center rounded-xl bg-white/[0.03] hover:bg-white/10 border border-white/10 text-zinc-400 hover:text-white transition-all shadow-sm"
                title="Toggle Light/Dark Theme"
              >
                {theme === 'dark' ? (
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-amber-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                  </svg>
                ) : (
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-indigo-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.24c-1.25.08-2.47-.36-3.44-1.2-1.24-1.07-1.74-2.73-1.26-4.27C11.31 1 7 5.13 7 10.12c0 5.07 4.1 9.17 9.17 9.17 3.09 0 5.86-1.52 7.53-3.87a9.18 9.18 0 01-2-.18z" />
                  </svg>
                )}
              </button>
            </div>
          </header>

          {/* Main Navigation Tabs */}
          <div class="mt-6 flex border-b border-white/10">
            <button
              onClick={() => setActiveMainTab('sentiment')}
              class={`px-6 py-3 text-xs font-bold uppercase tracking-wider transition-all-300 border-b-2 ${
                activeMainTab === 'sentiment'
                  ? 'border-green-500 text-green-400 font-extrabold'
                  : 'border-transparent text-zinc-400 hover:text-white'
              }`}
            >
              📊 Market Sentiment
            </button>
            <button
              onClick={() => setActiveMainTab('news')}
              class={`px-6 py-3 text-xs font-bold uppercase tracking-wider transition-all-300 border-b-2 ${
                activeMainTab === 'news'
                  ? 'border-green-500 text-green-400 font-extrabold'
                  : 'border-transparent text-zinc-400 hover:text-white'
              }`}
            >
              📰 News Terminal
            </button>
            <button
              onClick={() => setActiveMainTab('calculator')}
              class={`px-6 py-3 text-xs font-bold uppercase tracking-wider transition-all-300 border-b-2 ${
                activeMainTab === 'calculator'
                  ? 'border-green-500 text-green-400 font-extrabold'
                  : 'border-transparent text-zinc-400 hover:text-white'
              }`}
            >
              🧮 Position & Risk Calculator
            </button>

    function AssetCard({ data, onClick }) {
      if (!data) {
        return (
          <div class="min-h-[220px] rounded-3xl border border-white/[0.05] bg-zinc-900/10 p-6 animate-pulse flex flex-col justify-between">
            <div class="h-6 w-24 bg-white/[0.05] rounded"></div>
            <div class="h-10 w-full bg-white/[0.05] rounded"></div>
            <div class="h-4 w-32 bg-white/[0.05] rounded"></div>
          </div>
        );
      }

      const longPct = (data.buyRatio * 100).toFixed(1);
      const shortPct = (data.sellRatio * 100).toFixed(1);

      let statusColor = 'bg-zinc-800 text-zinc-400';
      let statusLabel = 'HEALTHY';
      let glowClass = 'border-white/[0.08]';

      if (data.status === 'TRAPPED_LONG') {
        statusColor = 'bg-red-500/10 text-red-400 border border-red-500/20';
        statusLabel = 'TRAPPED LONG';
        glowClass = 'border-red-500/30 bg-red-950/5 glow-red';
      } else if (data.status === 'TRAPPED_SHORT') {
        statusColor = 'bg-orange-500/10 text-orange-400 border border-orange-500/20';
        statusLabel = 'TRAPPED SHORT';
        glowClass = 'border-orange-500/30 bg-orange-950/5 glow-orange';
      } else if (data.status === 'EXTREME_LONG') {
        statusColor = 'bg-red-400/10 text-red-300';
        statusLabel = 'EXTREME LONG';
      } else if (data.status === 'EXTREME_SHORT') {
        statusColor = 'bg-orange-400/10 text-orange-300';
        statusLabel = 'EXTREME SHORT';
      }

      const bias = getContrarianBias(data.buyRatio);
      let biasLabel = 'NEUTRAL';
      let biasColor = 'text-zinc-400';
      if (bias === 'STRONG_BEARISH') { biasLabel = 'STRONG BEARISH'; biasColor = 'text-red-400 font-extrabold'; }
      else if (bias === 'BEARISH') { biasLabel = 'BEARISH'; biasColor = 'text-red-300 font-semibold'; }
      else if (bias === 'STRONG_BULLISH') { biasLabel = 'STRONG BULLISH'; biasColor = 'text-green-400 font-extrabold'; }
      else if (bias === 'BULLISH') { biasLabel = 'BULLISH'; biasColor = 'text-green-300 font-semibold'; }

      return (
        <div 
          onClick={onClick}
          class={`group flex min-h-[260px] flex-col justify-between rounded-3xl border bg-zinc-950 p-6 cursor-pointer transition-all-300 hover:-translate-y-1 hover:border-green-500/30 hover:bg-zinc-900/10 ${glowClass}`}

            <div>
              <div class="flex items-center gap-1.5">
                <span class="font-mono text-xs font-bold text-zinc-500 tracking-wider uppercase">
                  {data.id}

                <span class={`flex h-1.5 w-1.5 rounded-full ${checkMarketOpen(data.type) ? 'bg-green-500 glow-green' : 'bg-zinc-600'}`}></span>
                <span class="text-[8px] font-bold text-zinc-500 tracking-wider">
                  {checkMarketOpen(data.type) ? 'OPEN' : 'CLOSED'}
                </span>
              </div>
              <h3 class="mt-1 font-heading text-lg font-bold text-white group-hover:text-green-400 transition-colors">
                {data.name}
              </h3>
              {data.indicators && data.indicators.harmonicPattern && data.indicators.harmonicPattern.pattern && (
                <span class={`mt-1.5 inline-block rounded border px-2 py-0.5 text-[8px] font-bold tracking-wider uppercase font-mono ${
                  data.indicators.harmonicPattern.pattern.includes('Bullish')
                    ? 'border-green-500/30 bg-green-500/5 text-green-400'
                    : 'border-orange-500/30 bg-orange-500/5 text-orange-400'
                }`}>
                  ★ {data.indicators.harmonicPattern.pattern}
                </span>
              )}
            </div>
            <span class={`rounded-full px-2.5 py-1 text-[9px] font-bold tracking-wider uppercase ${statusColor}`}>
              {statusLabel}
            </span>
          </div>

          <div class="mt-4 flex items-baseline justify-between">
            <span class="font-mono text-xl font-bold tracking-tight text-white">
              {data.price.toLocaleString('en-US', { minimumFractionDigits: data.type === 'crypto' ? (data.price > 100 ? 2 : 4) : 4 })}

            <span class={`font-mono text-sm font-semibold ${data.change24h >= 0 ? 'text-green-400' : 'text-red-400'}`}>
              {data.change24h >= 0 ? '+' : ''}{data.change24h}%

          <div class="mt-5 space-y-2">
            <div class="flex items-center justify-between text-[11px] font-bold text-zinc-400 font-mono">

    function DetailModal({ asset, timeframe, newsList = [], theme = 'dark', onTimeframeChange, onClose }) {
      const chartContainerRef = useRef(null);
      const overlayCanvasRef = useRef(null);
      const tvChartRef = useRef(null);
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [activeTab, setActiveTab] = useState('plan'); // 'plan' or 'indicators'

      const getActiveSessions = () => {
        const now = new Date();
        const utcHours = now.getUTCHours();
        const wibHours = (utcHours + 7) % 24;
        const wibMinutes = now.getUTCMinutes();
        const currentWibTimeStr = `${wibHours.toString().padStart(2, '0')}:${wibMinutes.toString().padStart(2, '0')} WIB`;

        const sessions = [];
        if (wibHours >= 6 && wibHours < 14) sessions.push('Asia (Tokyo)');
        if (wibHours >= 13 && wibHours < 22) sessions.push('Eropa (London)');
        if (wibHours >= 20 || wibHours < 5) sessions.push('Amerika (New York)');

        return { wibHours, currentWibTimeStr, sessions };
      };

      const getAssetTradingHours = (asset) => {
        if (asset.type === 'crypto') {
          return {
            hfmHours: "24 Jam / 7 Hari Seminggu (Senin s/d Minggu penuh tanpa libur).",
            peakSession: "Volatilitas puncak terjadi pada Sesi Overlap London-New York (pukul 19:00 s/d 23:00 WIB) dan Sesi New York malam hari."
          };
        }
        if (asset.id === 'XAU') {
          return {
            hfmHours: "Senin pukul 05:00 WIB s/d Sabtu pukul 04:00 WIB (Daily Break: Selasa s/d Jumat pukul 04:00 - 05:00 WIB).",
            peakSession: "Sangat direkomendasikan ditransaksikan saat Sesi Overlap London & New York (pukul 19:00 - 23:00 WIB) untuk volatilitas optimal."
          };
        }
        if (asset.id === 'USDJPY' || asset.id === 'EURJPY' || asset.id === 'GBPJPY') {
          return {
            hfmHours: "Senin pukul 05:05 WIB s/d Sabtu pukul 04:55 WIB (Running 24 jam penuh dari Senin pagi hingga Sabtu dini hari).",
            peakSession: "Volatilitas tinggi terjadi pada Sesi Asia/Tokyo (06:00 - 13:00 WIB) dan berlanjut ke Sesi London/Eropa sore hari."
          };
        }
        if (asset.id === 'AUDUSD' || asset.id === 'NZDUSD') {
          return {
            hfmHours: "Senin pukul 05:05 WIB s/d Sabtu pukul 04:55 WIB.",
            peakSession: "Sesi paling aktif adalah Sesi Sydney & Tokyo (pukul 05:00 s/d 13:00 WIB) ketika bank sentral Australia/Selandia Baru merilis data ekonomi."
          };
        }
        return {
          hfmHours: "Senin pukul 05:05 WIB s/d Sabtu pukul 04:55 WIB (Running 24 jam penuh dari Senin pagi hingga Sabtu dini hari).",
          peakSession: "Puncak aktivitas perdagangan terjadi saat Sesi London (13:00 - 21:00 WIB) dan Sesi New York (20:00 - 04:00 WIB)."
        };
      };

      const getAntigravityAssessment = (asset) => {
        const indicators = asset.indicators || {};
        const rsi = indicators.rsi !== undefined ? indicators.rsi : 50;
        const sma20 = indicators.sma20 !== undefined ? indicators.sma20 : asset.price;
        const ema50 = indicators.ema50 !== undefined ? indicators.ema50 : asset.price;
        
        const isBullish = rsi > 50 && asset.price > sma20;
        const price = asset.price;
        
        const atrEstimate = price * 0.012; // 1.2% ATR estimate
        const entry = parseFloat(price.toFixed(price > 100 ? 2 : 4));
        const sl = isBullish ? parseFloat((price - atrEstimate).toFixed(price > 100 ? 2 : 4)) : parseFloat((price + atrEstimate).toFixed(price > 100 ? 2 : 4));
        const tp = isBullish ? parseFloat((price + atrEstimate * 2.5).toFixed(price > 100 ? 2 : 4)) : parseFloat((price - atrEstimate * 2.5).toFixed(price > 100 ? 2 : 4));
        
        const recommendedTimeframe = asset.type === 'crypto' ? 'H4 / D1 (Swing)' : 'H1 / H4 (Intraday)';
        
        // Scan newsList for macro catalysts
        let fedSentiment = "netral";
        let cpiSentiment = "stabil";
        let trumpFactor = "netral";
        let geopolitics = "kondusif";
        let nfpSentiment = "sehat";
        
        const combinedNewsText = (newsList || []).map(n => ((n.title || '') + ' ' + (n.summary || '')).toLowerCase()).join(' ');
        
        if (combinedNewsText.includes('fed') || combinedNewsText.includes('fomc') || combinedNewsText.includes('powell')) {
          if (combinedNewsText.includes('hawkish') || combinedNewsText.includes('rate hike') || combinedNewsText.includes('tahan suku bunga')) {

          } else if (combinedNewsText.includes('dovish') || combinedNewsText.includes('rate cut') || combinedNewsText.includes('pangkas suku bunga')) {

        if (combinedNewsText.includes('cpi') || combinedNewsText.includes('inflasi') || combinedNewsText.includes('inflation')) {

        if (combinedNewsText.includes('perang') || combinedNewsText.includes('war') || combinedNewsText.includes('geopolitik') || combinedNewsText.includes('serangan') || combinedNewsText.includes('rusia') || combinedNewsText.includes('ukraina') || combinedNewsText.includes('timur tengah')) {
          geopolitics = "memanas (meningkatkan permintaan safe haven seperti Gold/XAU dan USD)";
        }
        
        if (combinedNewsText.includes('nfp') || combinedNewsText.includes('tenaga kerja') || combinedNewsText.includes('non-farm payroll') || combinedNewsText.includes('pengangguran')) {
          if (combinedNewsText.includes('lemah') || combinedNewsText.includes('meleset') || combinedNewsText.includes('buruk')) {
            nfpSentiment = "melemah (tekanan pasar tenaga kerja, mendukung pemangkasan suku bunga)";
          } else if (combinedNewsText.includes('kuat') || combinedNewsText.includes('bagus') || combinedNewsText.includes('melampaui')) {
            nfpSentiment = "solid (pasar tenaga kerja kuat, Fed tidak terburu-buru pangkas rate)";
          }
        }

        let analysisText = "";
        let macroSummary = `Fed Stance: ${fedSentiment} | CPI/Inflasi: ${cpiSentiment} | Tenaga Kerja/NFP: ${nfpSentiment} | Geopolitik: ${geopolitics} | Trump Factor: ${trumpFactor}`;
        
        if (isBullish) {
          analysisText = `Antigravity AI mendeteksi penumpukan likuiditas institusional di area diskon di bawah harga saat ini. Struktur pasar pada TF ${recommendedTimeframe} secara dominan menunjukkan Higher Highs dan Higher Lows, terlepas dari bias ritel yang mungkin sedang panik menaruh posisi short. EMA 50 mendukung kelanjutan momentum bullish. Kami merekomendasikan entri beli bertahap dekat zona rata-rata harga harian. \n\n[Analisis Fundamental Makro]: ${macroSummary}`;
        } else {
          analysisText = `Analisis aliran dana institusi menunjukkan distribusi pasokan yang kuat pada kisaran resistance atas di TF ${recommendedTimeframe}. Sentimen ritel mungkin bias buy, namun secara teknikal murni, harga ditolak berulang kali di area EMA 50 dan Stochastic menunjukkan kejenuhan beli. Target penurunan berada pada level support Fibonacci berikutnya. \n\n[Analisis Fundamental Makro]: ${macroSummary}`;
        }
        
        return { isBullish, entry, sl, tp, recommendedTimeframe, analysisText };
      };

      const getSentinelVerdict = (asset) => {
        const indicators = asset.indicators || {};
        const rsi = indicators.rsi !== undefined ? indicators.rsi : 50;
        const sma20 = indicators.sma20 !== undefined ? indicators.sma20 : asset.price;
        const macdHist = indicators.macd && indicators.macd.histogram !== undefined ? indicators.macd.histogram : 0;

        const isContrarianBuy = asset.status === 'TRAPPED_SHORT';
        const isContrarianSell = asset.status === 'TRAPPED_LONG';
        
        const isTrendBuy = rsi > 50 && asset.price > sma20;
        const isTrendSell = rsi < 50 && asset.price < sma20;
        
        let buyScore = 0;
        let sellScore = 0;
        
        if (isContrarianBuy) buyScore += 35;
        if (isContrarianSell) sellScore += 35;
        
        if (isTrendBuy) buyScore += 35;
        if (isTrendSell) sellScore += 35;
        
        if (rsi < 30) buyScore += 15;
        if (rsi > 70) sellScore += 15;
        
        if (macdHist > 0) buyScore += 15;
        else sellScore += 15;
        
        let verdictClass = 'bg-zinc-800 text-zinc-400';
        let verdictText = 'NEUTRAL / WAIT';
        let explanation = 'Sinyal contrarian ritel dan tren momentum teknikal saling bertolak belakang. Direkomendasikan menunggu konfirmasi breakout pada level Fibonacci sebelum masuk posisi.';
        
        if (buyScore > 60) {
          verdictText = buyScore >= 80 ? 'STRONG BUY CONFLUENCE' : 'BUY BIAS';
          verdictClass = buyScore >= 80 ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-green-500/5 text-green-300 border border-green-500/10';
          explanation = `Dasbor Sentinel menyimpulkan bias BULLISH dengan tingkat keyakinan ${buyScore}%. Terjadi keselarasan antara sentimen ritel yang terjebak short (contrarian buy) dan momentum indikator teknikal (RSI & MACD) yang menunjukkan kekuatan pembelian.`;
        } else if (sellScore > 60) {
          verdictText = sellScore >= 80 ? 'STRONG SELL CONFLUENCE' : 'SELL BIAS';
          verdictClass = sellScore >= 80 ? 'bg-orange-500/10 text-orange-400 border border-orange-500/20' : 'bg-orange-500/5 text-orange-300 border border-orange-500/10';
          explanation = `Dasbor Sentinel menyimpulkan bias BEARISH dengan tingkat keyakinan ${sellScore}%. Terjadi keselarasan antara ritel yang terperangkap buy (contrarian sell) dan penolakan harga pada area EMA 50 serta histogram MACD negatif.`;
        }
        return { verdictText, verdictClass, explanation };
      };

      // TradingView Lightweight Charts rendering
      useEffect(() => {
        if (!chartContainerRef.current || !asset.candles || asset.candles.length === 0) return;

        // Destroy previous chart
        if (tvChartRef.current) {
          tvChartRef.current.remove();
          tvChartRef.current = null;
        }

        const container = chartContainerRef.current;
        container.innerHTML = '';

        const chartHeight = isFullscreen ? (window.innerHeight - 180) : 260;
        const isLightTheme = theme === 'light';
        const chart = LightweightCharts.createChart(container, {
          width: container.clientWidth,
          height: chartHeight,
          layout: {
            background: { type: 'solid', color: isLightTheme ? '#ffffff' : 'transparent' },
            textColor: isLightTheme ? '#475569' : '#71717a',
            fontSize: 10,
            fontFamily: 'JetBrains Mono, monospace',
          },
          grid: {
            vertLines: { color: isLightTheme ? 'rgba(15,23,42,0.04)' : 'rgba(255,255,255,0.03)' },
            horzLines: { color: isLightTheme ? 'rgba(15,23,42,0.04)' : 'rgba(255,255,255,0.03)' },
          },
          crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { color: isLightTheme ? 'rgba(59,130,246,0.3)' : 'rgba(234,179,8,0.3)', labelBackgroundColor: isLightTheme ? '#cbd5e1' : '#18181b' },
            horzLine: { color: isLightTheme ? 'rgba(59,130,246,0.3)' : 'rgba(234,179,8,0.3)', labelBackgroundColor: isLightTheme ? '#cbd5e1' : '#18181b' },
          },
          rightPriceScale: {
            borderColor: isLightTheme ? '#e2e8f0' : 'rgba(255,255,255,0.06)',
            scaleMargins: { top: 0.15, bottom: 0.15 },
          },
          timeScale: {
            borderColor: isLightTheme ? '#e2e8f0' : 'rgba(255,255,255,0.06)',
            timeVisible: true,
            secondsVisible: false,
          },
          handleScroll: true,
          handleScale: true,
        });
        tvChartRef.current = chart;

        // Candlestick series
        const candleSeries = chart.addCandlestickSeries({
          upColor: '#22c55e',
          downColor: '#ef4444',
          borderUpColor: '#22c55e',
          borderDownColor: '#ef4444',
          wickUpColor: '#22c55e80',
          wickDownColor: '#ef444480',
        });

        const tvCandles = asset.candles.map(c => ({
          time: Math.floor(c.time / 1000),
          open: c.open,
          high: c.high,
          low: c.low,
          close: c.close,
        }));
        candleSeries.setData(tvCandles);

        // EMA / SMA price lines
        const inds = asset.indicators || {};
        if (inds.ema20) {
          candleSeries.createPriceLine({
            price: inds.ema20,
            color: '#3b82f6',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: false,
            title: 'EMA20',
          });
        }
        if (inds.ema50) {
          candleSeries.createPriceLine({
            price: inds.ema50,
            color: '#f59e0b',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: false,
            title: 'EMA50',
          });
        }
        if (inds.sma100) {
          candleSeries.createPriceLine({
            price: inds.sma100,
            color: '#a855f7',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: false,
            title: 'SMA100',
          });
        }

        // Canvas overlay configuration
        const overlayCanvas = overlayCanvasRef.current;
        const resizeCanvas = () => {
          if (!overlayCanvas || !container) return;
          const dpr = window.devicePixelRatio || 1;
          const currentHeight = isFullscreen ? (window.innerHeight - 180) : 260;
          overlayCanvas.width = container.clientWidth * dpr;
          overlayCanvas.height = currentHeight * dpr;
          overlayCanvas.style.width = `${container.clientWidth}px`;
          overlayCanvas.style.height = `${currentHeight}px`;
          const ctx = overlayCanvas.getContext('2d');
          ctx.resetTransform();
          ctx.scale(dpr, dpr);
        };
        resizeCanvas();

        let redrawOverlay = () => {};

        // Harmonic Pattern overlay using LineSeries & Shaded Triangles on Canvas
        if (inds.harmonicPattern && inds.harmonicPattern.points) {
          const hp = inds.harmonicPattern;
          const pts = hp.points;

          // Safely resolve each point
          const resolvePoint = (pt, fallbackIdx) => {
            if (pt && typeof pt === 'object' && pt.price !== undefined) {
              if (pt.index !== undefined && pt.index !== null && !isNaN(pt.index)) {
                const idx = Math.max(0, Math.min(tvCandles.length - 1, Math.floor(pt.index)));
                if (tvCandles[idx]) {
                  return { time: tvCandles[idx].time, value: pt.price };
                }
              }
              if (pt.time !== undefined && pt.time !== null && !isNaN(pt.time)) {
                return { time: Math.floor(pt.time / 1000), value: pt.price };
              }
            }
            const fallbackVal = (pt && typeof pt === 'object') ? pt.price : pt;
            const idx = Math.max(0, Math.min(tvCandles.length - 1, fallbackIdx || 0));
            const timeVal = tvCandles[idx] ? tvCandles[idx].time : Math.floor(Date.now() / 1000);
            return { time: timeVal, value: fallbackVal };
          };

          const pX = resolvePoint(pts.X, 0);
          const pA = resolvePoint(pts.A, Math.floor(tvCandles.length * 0.25));
          const pB = resolvePoint(pts.B, Math.floor(tvCandles.length * 0.5));
          const pC = resolvePoint(pts.C, Math.floor(tvCandles.length * 0.75));
          const pD = resolvePoint(pts.D, tvCandles.length - 1);

          // Add XABCD markers on the candlestick series
          const labels = ['X', 'A', 'B', 'C', 'D'];
          const positions = [pX, pA, pB, pC, pD];
          const markers = positions.map((p, i) => ({
            time: p.time,
            position: i % 2 === 0 ? 'belowBar' : 'aboveBar',
            color: '#eab308',
            shape: 'circle',
            text: labels[i],
          })).filter(m => m.time);

          markers.sort((a, b) => a.time - b.time);
          candleSeries.setMarkers(markers);

          // Redraw shaded triangles XAB and BCD on the overlay canvas
          redrawOverlay = () => {
            if (!overlayCanvas || !tvChartRef.current) return;
            const ctx = overlayCanvas.getContext('2d');
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            const getCoords = (p) => {
              if (!p || p.value === undefined || p.value === null || isNaN(p.value) || p.time === undefined || p.time === null || isNaN(p.time)) {
                return { x: null, y: null };
              }
              
              let x = chart.timeScale().timeToCoordinate(p.time);
              let y = candleSeries.priceToCoordinate(p.value);

              // Off-screen coordinate estimation if null
              if (x === null) {
                const visibleRange = chart.timeScale().getVisibleRange();
                if (visibleRange && visibleRange.from !== undefined && visibleRange.from !== null) {
                  if (p.time < visibleRange.from) {
                    x = -500;
                  } else {
                    x = container.clientWidth + 500;
                  }
                } else {
                  x = -500;
                }
              }
              if (y === null || isNaN(y)) {
                y = 0;
              }
              return { x, y };
            };

            const cX = getCoords(pX);
            const cA = getCoords(pA);
            const cB = getCoords(pB);
            const cC = getCoords(pC);
            const cD = getCoords(pD);

            // Abort drawing if any coordinate is NaN
            if (
              cX.x === null || cX.y === null || isNaN(cX.x) || isNaN(cX.y) ||
              cA.x === null || cA.y === null || isNaN(cA.x) || isNaN(cA.y) ||
              cB.x === null || cB.y === null || isNaN(cB.x) || isNaN(cB.y) ||
              cC.x === null || cC.y === null || isNaN(cC.x) || isNaN(cC.y) ||
              cD.x === null || cD.y === null || isNaN(cD.x) || isNaN(cD.y)
            ) {
              return;
            }

            // Draw shaded triangles X-A-B and B-C-D
            ctx.fillStyle = 'rgba(234, 179, 8, 0.12)';
            
            ctx.beginPath();
            ctx.moveTo(cX.x, cX.y);
            ctx.lineTo(cA.x, cA.y);
            ctx.lineTo(cB.x, cB.y);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(cB.x, cB.y);
            ctx.lineTo(cC.x, cC.y);
            ctx.lineTo(cD.x, cD.y);
            ctx.closePath();
            ctx.fill();

            // Draw dashed lines X-A-B-C-D
            ctx.strokeStyle = '#eab308';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(cX.x, cX.y);
            ctx.lineTo(cA.x, cA.y);
            ctx.lineTo(cB.x, cB.y);
            ctx.lineTo(cC.x, cC.y);
            ctx.lineTo(cD.x, cD.y);
            ctx.stroke();

            // Draw straight boundary line X-D
            ctx.strokeStyle = 'rgba(234, 179, 8, 0.35)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cX.x, cX.y);
            ctx.lineTo(cD.x, cD.y);
            ctx.stroke();

            ctx.setLineDash([]);

            // Harmonic Forecast Overlay (Arrow, PRZ box, SL line, TP line)
            const hp = asset.indicators ? asset.indicators.harmonicPattern : null;
            if (hp && hp.points && hp.points.X && hp.points.A && hp.points.D) {
              const ptX = hp.points.X;
              const ptA = hp.points.A;
              const ptD = hp.points.D;
              const patternName = hp.pattern || '';
              
              if (cX.x !== null && cA.x !== null && cD.x !== null && cD.y !== null) {
                const isBullishForecast = patternName.toLowerCase().includes('bullish');
                
                // Calculate dynamic levels
                const priceRange = Math.abs(ptA.price - ptX.price);
                const przUpperPrice = isBullishForecast ? ptD.price * 1.003 : ptD.price * 1.005;
                const przLowerPrice = isBullishForecast ? ptD.price * 0.995 : ptD.price * 0.997;
                
                const slPrice = isBullishForecast 
                  ? Math.min(ptX.price, ptD.price) * 0.992 
                  : Math.max(ptX.price, ptD.price) * 1.008;
                  
                const tpPrice = isBullishForecast 
                  ? ptD.price + priceRange * 0.618 
                  : ptD.price - priceRange * 0.618;
                  
                // Coordinates
                const yUpper = candleSeries.priceToCoordinate(przUpperPrice);
                const yLower = candleSeries.priceToCoordinate(przLowerPrice);
                const ySL = candleSeries.priceToCoordinate(slPrice);
                const yTP = candleSeries.priceToCoordinate(tpPrice);
                
                if (yUpper !== null && yLower !== null && ySL !== null && yTP !== null) {
                   const slDistance = Math.abs(ptD.price - slPrice);
                   const tpDistance = Math.abs(tpPrice - ptD.price);

                   // Discard weak harmonic signals where Stop Loss distance exceeds Take Profit distance
                   if (slDistance > tpDistance) {
                     return;
                   }

                   // 1. Horizontal PRZ Rectangle Box (starts shortly after D)
                   const przXStart = cD.x + 15;
                   const przWidth = 70;
                   const przHeight = Math.max(12, Math.abs(yUpper - yLower));
                   const przYTop = Math.min(yUpper, yLower);
                   const przCenterX = przXStart + przWidth / 2;
                   const przCenterY = przYTop + przHeight / 2;

                   // Draw and fill PRZ Box
                   ctx.fillStyle = 'rgba(59, 130, 246, 0.08)';
                   ctx.fillRect(przXStart, przYTop, przWidth, przHeight);
                   ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
                   ctx.lineWidth = 1;
                   ctx.beginPath();
                   ctx.rect(przXStart, przYTop, przWidth, przHeight);
                   ctx.stroke();

                   // Draw "PRZ" text inside the center of the box
                   ctx.fillStyle = 'rgba(59, 130, 246, 0.85)';
                   ctx.font = 'bold 9px JetBrains Mono, monospace';
                   ctx.fillText('PRZ', przCenterX - 8, przCenterY + 3);

                   // Print upper and lower boundary prices at the right ends of the box
                   ctx.fillStyle = '#60a5fa';
                   ctx.font = '8px JetBrains Mono, monospace';
                   ctx.fillText(`(${przUpperPrice.toFixed(asset.price > 100 ? 2 : 5)})`, przXStart + przWidth + 4, yUpper + 3);
                   ctx.fillText(`(${przLowerPrice.toFixed(asset.price > 100 ? 2 : 5)})`, przXStart + przWidth + 4, yLower + 3);

                   // 2. Zigzag Reversal Arrow: D -> PRZ Center -> Reversal Target
                   const arrowEndX = przXStart + przWidth + 25;
                   const arrowEndY = yTP;
                   
                   ctx.strokeStyle = '#38bdf8'; // Sky blue matching reference image
                   ctx.lineWidth = 2.0;
                   ctx.beginPath();
                   ctx.moveTo(cD.x, cD.y);
                   ctx.lineTo(przCenterX, przCenterY);
                   ctx.lineTo(arrowEndX, arrowEndY);
                   ctx.stroke();

                   // Arrowhead
                   const angle = Math.atan2(arrowEndY - przCenterY, arrowEndX - przCenterX);
                   ctx.fillStyle = '#38bdf8';
                   ctx.beginPath();
                   ctx.moveTo(arrowEndX, arrowEndY);
                   ctx.lineTo(arrowEndX - 7 * Math.cos(angle - Math.PI / 6), arrowEndY - 7 * Math.sin(angle - Math.PI / 6));
                   ctx.lineTo(arrowEndX - 7 * Math.cos(angle + Math.PI / 6), arrowEndY - 7 * Math.sin(angle + Math.PI / 6));
                   ctx.closePath();
                   ctx.fill();

                   // 3. Lines draw range (shifted right to avoid overlapping PRZ labels)
                   const linesXStart = przXStart + przWidth + 75;
                   const linesXEnd = cD.x + 200;

                   // Draw Invalidation/SL Line (horizontal red dashed line)
                   ctx.strokeStyle = '#ef4444';
                   ctx.lineWidth = 1.5;
                   ctx.setLineDash([4, 4]);
                   ctx.beginPath();
                   ctx.moveTo(linesXStart, ySL);
                   ctx.lineTo(linesXEnd, ySL);
                   ctx.stroke();
                   ctx.setLineDash([]);
                   
                   // SL Price label
                   ctx.fillStyle = '#ef4444';
                   ctx.font = 'bold 9px JetBrains Mono, monospace';
                   ctx.fillText(`SL: (${slPrice.toFixed(asset.price > 100 ? 2 : 5)})`, linesXEnd + 4, ySL + 3);

                   // 4. Expected Target / TP Line (horizontal green solid line)
                   ctx.strokeStyle = '#22c55e';
                   ctx.lineWidth = 1.5;
                   ctx.beginPath();
                   ctx.moveTo(linesXStart, yTP);
                   ctx.lineTo(linesXEnd, yTP);
                   ctx.stroke();
                   
                   // TP Price label
                   ctx.fillStyle = '#22c55e';
                   ctx.font = 'bold 9px JetBrains Mono, monospace';
                   ctx.fillText(`TP: (${tpPrice.toFixed(asset.price > 100 ? 2 : 5)})`, linesXEnd + 4, yTP + 3);
                }
              }
            }
          };

          // Subscribe to visible range updates (both horizontal time range and vertical price range)
          if (chart.timeScale() && typeof chart.timeScale().subscribeVisibleTimeRangeChange === 'function') {
            chart.timeScale().subscribeVisibleTimeRangeChange(redrawOverlay);
          }
          if (chart.priceScale('right') && typeof chart.priceScale('right').subscribeVisiblePriceRangeChange === 'function') {
            chart.priceScale('right').subscribeVisiblePriceRangeChange(redrawOverlay);
          }
          setTimeout(redrawOverlay, 100);
        }

        chart.timeScale().fitContent();

        // Responsive resize
        const resizeObserver = new ResizeObserver(() => {
          if (chartContainerRef.current) {
            const currentHeight = isFullscreen ? (window.innerHeight - 180) : 260;
            chart.applyOptions({ 
              width: chartContainerRef.current.clientWidth,
              height: currentHeight
            });
            resizeCanvas();
            redrawOverlay();
          }
        });
        resizeObserver.observe(container);

        return () => {
          resizeObserver.disconnect();
          chart.remove();
          tvChartRef.current = null;
        };
      }, [asset, isFullscreen, theme]);

      // Calculate Fibonacci-based Trade Setup
      const getTradeSetup = () => {
        const fib = asset.indicators ? asset.indicators.fibonacci : null;
        if (!fib || !fib.levels) return null;

        const bias = getContrarianBias(asset.buyRatio);
        const isBullish = bias.includes('BULLISH');
        const isBearish = bias.includes('BEARISH');

        let entryMin, entryMax, stopLoss, tp1, tp2, tp3;

        if (isBullish) {
          // Uptrend logic / buy target
          entryMin = fib.levels['0.618'];
          entryMax = fib.levels['0.500'];
          stopLoss = fib.levels['0.786'] * 0.998; // SL slightly below 78.6%
          tp1 = fib.levels['0.000']; // Swing High
          tp2 = fib.levels['-0.272']; // Extension -0.272
          tp3 = fib.levels['-0.618']; // Extension -0.618
        } else {
          // Downtrend logic / sell target (default or bearish)
          entryMin = fib.levels['0.500'];
          entryMax = fib.levels['0.618'];
          stopLoss = fib.levels['0.786'] * 1.002; // SL slightly above 78.6%
          tp1 = fib.levels['0.000']; // Swing Low
          tp2 = fib.levels['-0.272']; // Extension -0.272
          tp3 = fib.levels['-0.618']; // Extension -0.618
        }

        const format = (v) => v.toLocaleString('en-US', { minimumFractionDigits: asset.price > 100 ? 2 : 4 });

        return {
          isBullish,
          entryRange: `${format(entryMin)} - ${format(entryMax)}`,
          stopLoss: format(stopLoss),
          tp1: format(tp1),
          tp2: format(tp2),
          tp3: format(tp3),
          raw: { entryMin, entryMax, stopLoss, tp1, tp2, tp3 }
        };
      };

      const setup = getTradeSetup();
      const longPct = (asset.buyRatio * 100).toFixed(1);
      const shortPct = (asset.sellRatio * 100).toFixed(1);

      return (
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity duration-300">

    // ====================================================
    // Dedicated Position & Risk Calculator Component
    // ====================================================
    function PositionCalculatorPage({ marketData, theme }) {
      const [selectedAssetId, setSelectedAssetId] = useState('BTC');
      const [tradeDirection, setTradeDirection] = useState('BUY');
      const [accountSizeStr, setAccountSizeStr] = useState('10000');
      const [riskValueStr, setRiskValueStr] = useState('1');
      const [rewardValueStr, setRewardValueStr] = useState('2');
      const [riskUnit, setRiskUnit] = useState('%');
      const [customEntryStr, setCustomEntryStr] = useState('');
      const [customSLStr, setCustomSLStr] = useState('');
      const [customTPStr, setCustomTPStr] = useState('');
      const [expectedProfitStr, setExpectedProfitStr] = useState('');
      const [lotsInputStr, setLotsInputStr] = useState('');
      const [aiCalcResult, setAiCalcResult] = useState(null);

      const activeAsset = ALL_ASSETS.find(a => a.id === selectedAssetId) || ALL_ASSETS[0];
      const liveAssetData = marketData[selectedAssetId];

      useEffect(() => {
        if (liveAssetData && liveAssetData.price) {
          setCustomEntryStr(liveAssetData.price.toString());
          const isBuy = tradeDirection === 'BUY';
          const entry = liveAssetData.price;
          const fib = liveAssetData.indicators ? liveAssetData.indicators.fibonacci : null;
          if (fib && fib.levels) {
            setCustomSLStr(isBuy ? (fib.levels['0.786'] * 0.998).toFixed(entry > 100 ? 2 : 5) : (fib.levels['0.786'] * 1.002).toFixed(entry > 100 ? 2 : 5));
            setCustomTPStr(isBuy ? (fib.levels['0.236'] * 1.002).toFixed(entry > 100 ? 2 : 5) : (fib.levels['0.236'] * 0.998).toFixed(entry > 100 ? 2 : 5));
          } else {
            setCustomSLStr(isBuy ? (entry * 0.99).toFixed(entry > 100 ? 2 : 5) : (entry * 1.01).toFixed(entry > 100 ? 2 : 5));
            setCustomTPStr(isBuy ? (entry * 1.02).toFixed(entry > 100 ? 2 : 5) : (entry * 0.98).toFixed(entry > 100 ? 2 : 5));
          }
        }
      }, [selectedAssetId]);

      const calculateAiRecommendation = () => {
        const balance = parseFloat(accountSizeStr) || 0;
        const risk = parseFloat(riskValueStr) || 0;
        const reward = parseFloat(rewardValueStr) || 0;
        const entry = parseFloat(customEntryStr) || 0;
        const sl = parseFloat(customSLStr) || 0;
        const tp = parseFloat(customTPStr) || 0;
        const lots = parseFloat(lotsInputStr) || 0;
        const expProfit = parseFloat(expectedProfitStr) || 0;
        const isBuyMode = tradeDirection === 'BUY';

        let recSL = sl;
        let recTP = tp;
        let recLots = lots;
        let recRR = '';
        let safetyRating = 'AMAT AMAN';
        let safetyColor = 'text-green-400';
        let adviceList = [];
        let logs = [];

        if (entry <= 0) {
          setAiCalcResult({
            recSL: 'N/A', recTP: 'N/A', recLots: 'N/A', rr: 'N/A',
            safetyRating: 'INVALID', safetyColor: 'text-red-400',
            advice: 'Silakan masukkan Entry Price untuk memulai kalkulasi AI.',
            logs: ['Error: Entry Price tidak boleh kosong.']
          });
          return;
        }

        logs.push(`Analisis Sizing: ${activeAsset.name} (${activeAsset.id})`);
        logs.push(`Arah Posisi: ${tradeDirection} di harga ${entry.toLocaleString()}`);

        if (balance > 0) {
          logs.push(`Saldo Akun Aktif: $${balance.toLocaleString()}`);
        }

        if (sl <= 0) {
          recSL = isBuyMode ? entry * 0.99 : entry * 1.01;
          adviceList.push("Stop Loss Anda kosong. AI mematok default 1.0% dari harga entri.");
        }
        if (tp <= 0) {
          recTP = isBuyMode ? entry * 1.02 : entry * 0.98;
          adviceList.push("Take Profit Anda kosong. AI mematok default 2.0% dari harga entri.");
        }

        const slDistance = Math.abs(entry - recSL);
        const tpDistance = Math.abs(recTP - entry);

        if (slDistance > 0) {
          const rr = tpDistance / slDistance;
          recRR = `1 : ${rr.toFixed(2)}`;
          logs.push(`Rasio Risk to Reward: ${recRR}`);
          if (rr < 1.5) {
            safetyRating = 'MODERAT / KURANG IDEAL';
            safetyColor = 'text-orange-400';
            adviceList.push("Rasio Risk-to-Reward berada di bawah 1:1.5. Disarankan melebarkan jarak TP.");
          }
        }

        if (expProfit > 0) {
          logs.push(`Expected Profit manual: $${expProfit.toLocaleString()}`);
          if (balance > 0) {
            const expPct = (expProfit / balance) * 100;
            logs.push(`Rencana Keuntungan: ${expPct.toFixed(2)}% dari modal`);
            if (expPct > 15) {
              adviceList.push("PERINGATAN: Target keuntungan Anda sangat agresif (> 15% modal). Pastikan leverage dan margin aman.");
            }
          }
        }

        if (liveAssetData) {
          const longPct = (liveAssetData.buyRatio * 100).toFixed(1);
          const shortPct = (liveAssetData.sellRatio * 100).toFixed(1);
          logs.push(`Live Sentimen: ${longPct}% Long vs ${shortPct}% Short`);

          if (liveAssetData.status === 'TRAPPED_LONG' && tradeDirection === 'BUY') {
            safetyRating = 'BERBAHAYA / HIGH RISK';
            safetyColor = 'text-red-500 animate-pulse';
            adviceList.push("PERINGATAN CONTRARIAN: Retail terperangkap Long di dasar. Smart money cenderung menyapu stop loss ke bawah. Menempatkan BUY saat ini beresiko tinggi.");
          } else if (liveAssetData.status === 'TRAPPED_SHORT' && tradeDirection === 'SELL') {
            safetyRating = 'BERBAHAYA / HIGH RISK';
            safetyColor = 'text-red-500 animate-pulse';
            adviceList.push("PERINGATAN CONTRARIAN: Retail terperangkap Short di pucuk. Tekanan likuiditas cenderung memicu squeeze ke atas. Menempatkan SELL beresiko terlikuidasi.");
          }
        }

        if (balance > 0 && risk > 0 && slDistance > 0) {
          const riskUSD = riskUnit === '%' ? (balance * (risk / 100)) : risk;
          if (activeAsset.type === 'forex') {
            const contractSize = activeAsset.id === 'XAU' ? 100 : 100000;
            let lotVal = riskUSD / (slDistance * contractSize);
            if (activeAsset.id === 'USDJPY') {
              lotVal = (riskUSD * 158.0) / (slDistance * contractSize);
            }
            recLots = lotVal;
            logs.push(`Lots Forex/Emas yang disarankan: ${recLots.toFixed(3)} Lots`);
          } else {
            recLots = riskUSD / slDistance;
            logs.push(`Kontrak Kripto yang disarankan: ${recLots.toFixed(3)} Koin`);
          }
        }

        if (lots > 0 && balance > 0) {
          let calculatedRiskUSD = lots * slDistance;
          if (activeAsset.type === 'forex') {
            const contractSize = activeAsset.id === 'XAU' ? 100 : 100000;
            calculatedRiskUSD = lots * slDistance * contractSize;
          }
          const riskPct = (calculatedRiskUSD / balance) * 100;
          logs.push(`Risiko Nyata (Lots manual): $${calculatedRiskUSD.toFixed(2)} (${riskPct.toFixed(2)}% dari saldo)`);
          if (riskPct > 5) {
            safetyRating = 'SANGAT AGRESIF / BERBAHAYA';
            safetyColor = 'text-red-500 animate-pulse';
            adviceList.push("WARNING: Lot yang dimasukkan manual menyebabkan risiko saldo akun melebihi 5%! Kurangi ukuran lot.");
          }
        }

        if (adviceList.length === 0) {
          adviceList.push("Manajemen posisi dan risiko Anda sangat aman dan logis berdasarkan kondisi pasar saat ini.");
        }

        setAiCalcResult({
          recSL: recSL.toFixed(entry > 100 ? 2 : 5),
          recTP: recTP.toFixed(entry > 100 ? 2 : 5),
          recLots: recLots > 0 ? recLots.toFixed(3) : 'Belum ditentukan',
          rr: recRR || 'Belum dihitung',
          safetyRating,
          safetyColor,
          advice: adviceList.join(" "),
          logs
        });
      };

      const clearAiRecommendation = () => {
        setAccountSizeStr('10000');
        setRiskValueStr('1');
        setRewardValueStr('2');
        setCustomEntryStr('');
        setCustomSLStr('');
        setCustomTPStr('');
        setExpectedProfitStr('');
        setLotsInputStr('');
        setAiCalcResult(null);
      };

      return (
        <section class="mt-8 rounded-3xl border border-white/10 bg-zinc-950 p-6 md:p-8 shadow-2xl">
          <div class="border-b border-white/5 pb-4">
            <h2 class="text-xl font-bold text-white uppercase font-heading">Global Position & Risk Calculator</h2>
            <p class="text-xs text-zinc-400 mt-1">
              Kalkulator manajemen posisi multi-aset mandiri. Pilih aset Anda, isi parameter transaksi, dan aktifkan asisten asessment Antigravity AI.
            </p>
          </div>

          <div class="mt-6 grid gap-6 md:grid-cols-[1fr_1fr]">
            {/* Left Column: Form Inputs */}
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 font-mono">1. Pilih Aset Bursa</label>
                <select
                  value={selectedAssetId}
                  onChange={(e) => setSelectedAssetId(e.target.value)}
                  class="mt-1 w-full rounded-xl border border-white/10 bg-zinc-900 px-4 py-3 text-xs font-bold text-white outline-none focus:border-green-500 cursor-pointer"
                >
                  {ALL_ASSETS.map(asset => (
                    <option key={asset.id} value={asset.id} class="bg-zinc-950 text-white">
                      [{asset.type.toUpperCase()}] {asset.id} - {asset.name}
                    </option>
                  ))}
                </select>
              </div>

              <div>
                <label class="block text-xs font-bold uppercase text-zinc-400 font-mono">2. Arah Transaksi (Trade Direction)</label>
                <div class="mt-1.5 flex rounded-xl bg-zinc-900 p-1 border border-white/5 font-mono text-xs overflow-hidden font-bold">
                  <button

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold uppercase text-zinc-400 font-mono">3. Saldo Akun / Account Balance ($)</label>
                  <input

              <div class="grid grid-cols-2 gap-4">

    // ====================================================

    function ContrarianPlaybook({ asset, timeframe }) {
      const longPct = (asset.buyRatio * 100).toFixed(1);
      const shortPct = (asset.sellRatio * 100).toFixed(1);

      // Analyze bias stance and write commentary
      let stance = 'NEUTRAL (Tunggu Distribusi)';
      let commentary = '';
      let styleClass = 'border-green-500/20 bg-green-500/[0.03]';

      if (asset.status === 'TRAPPED_LONG') {
        stance = 'STRONG BEARISH (Mencari Trigger Sell)';
        commentary = `Retail terperangkap membeli di dasar (*falling knife*) dengan posisi Long ${longPct}%. Likuiditas stop loss mereka menumpuk di bawah Swing Low terkini. Perusahaan institusi (smart money) cenderung menyapu stop loss ini untuk mendapatkan likuiditas jual. Tunggu koreksi ke area Fibonacci 0.500 atau 0.618 untuk mencari entry Jual.`;
        styleClass = 'border-red-500/25 bg-red-500/[0.03]';
      } else if (asset.status === 'TRAPPED_SHORT') {
        stance = 'STRONG BULLISH (Mencari Trigger Buy)';
        commentary = `Retail trader terperangkap shorting melawan momentum naik (*top picking*) dengan posisi Short ${shortPct}%. Likuiditas order beli stop loss mereka menumpuk di atas Swing High terkini. Gunakan zona Fibonacci retracement 0.500 - 0.618 sebagai diskon masuk Beli saat retest.`;
        styleClass = 'border-green-500/25 bg-green-500/[0.03]';
      } else if (asset.buyRatio > 0.60) {
        stance = 'BEARISH (Bias Sell)';
        commentary = `Akumulasi posisi Long retail mencapai ${longPct}%. Sesuai logika contrarian, bias pergerakan cenderung menurun karena pembeli retail kehabisan modal untuk mempertahankan dorongan ke atas. Targetkan kelanjutan struktur korektif ke arah bawah.`;
        styleClass = 'border-red-400/20 bg-red-400/[0.01]';
      } else if (asset.sellRatio > 0.60) {
        stance = 'BULLISH (Bias Buy)';
        commentary = `Penjual retail mendominasi pasar dengan ${shortPct}% Short. Likuiditas pembelian terkonsentrasi di atas resisten untuk menyapu order stop loss mereka. Peluang beli lebih disukai.`;
        styleClass = 'border-green-400/20 bg-green-400/[0.01]';
      } else {
        commentary = `Rasio sentimen retail berada di wilayah netral (${longPct}% Long vs ${shortPct}% Short). Tidak ada keunggulan contrarian yang jelas saat ini. Disarankan menunggu hingga rasio bergeser melebihi 60% di salah satu sisi.`;
      }

      return (
        <div class="space-y-4">
          <div class={`rounded-2xl border p-5 ${styleClass}`}>
            <h4 class="text-xs font-bold uppercase tracking-wider text-green-400">Contrarian Playbook</h4>
            <div class="mt-3">
              <span class="text-[10px] text-zinc-500 uppercase font-mono">Bias Stance</span>
              <p class="text-sm font-bold text-white mt-0.5">{stance}</p>
            </div>
            <div class="mt-2">
              <span class="text-[10px] text-zinc-500 uppercase font-mono">Rencana Analisis Taktis</span>
              <p class="text-xs text-zinc-300 mt-1 leading-relaxed">{commentary}</p>
            </div>
          </div>

          {asset.indicators && asset.indicators.harmonicPattern && (() => {
            const hp = asset.indicators.harmonicPattern;
            const pattern = hp.pattern || '';
            const confidence = hp.confidence || 0;
            const ratios = hp.ratios || {};
            const isBullish = pattern.includes('Bullish');
            const isSharkOrCypher = pattern.includes('Shark') || pattern.includes('Cypher');

            return (
              <div class={`rounded-2xl border p-5 ${
                isBullish
                  ? 'border-green-500/20 bg-green-500/[0.02]'
                  : 'border-orange-500/20 bg-orange-500/[0.02]'
              }`}>
                <div class="flex items-center justify-between border-b border-white/5 pb-2">
                  <h4 class="text-xs font-bold uppercase tracking-wider text-white">Harmonic Pattern Detected</h4>
                  <span class={`rounded px-1.5 py-0.5 text-[9px] font-bold ${
                    isBullish
                      ? 'bg-green-500/10 text-green-400'
                      : 'bg-orange-500/10 text-orange-400'
                  }`}>
                    {pattern}
                  </span>
                </div>
                
                <div class="mt-3 space-y-2 text-xs">
                  <div class="flex justify-between">
                    <span class="text-zinc-500">Pattern Match Confidence</span>
                    <span class="text-white font-mono font-bold">{confidence}%</span>
                  </div>
                  <div class="flex justify-between border-b border-white/[0.03] pb-1">
                    <span class="text-zinc-500">Rasio AB Retracement</span>
                    <span class="text-zinc-300 font-mono">{ratios.AB !== undefined ? ratios.AB : 'N/A'}</span>
                  </div>
                  <div class="flex justify-between border-b border-white/[0.03] pb-1">
                    <span class="text-zinc-500">Rasio BC Retracement</span>
                    <span class="text-zinc-300 font-mono">{ratios.BC !== undefined ? ratios.BC : 'N/A'}</span>
                  </div>
                  <div class="flex justify-between border-b border-white/[0.03] pb-1">
                    <span class="text-zinc-500">Rasio XD Retracement (D)</span>
                    <span class="text-zinc-300 font-mono">{ratios.XD !== undefined ? ratios.XD : 'N/A'}</span>
                  </div>
                </div>

                <div class="mt-4 rounded-lg bg-zinc-900/40 p-2.5 text-[11px] leading-relaxed text-zinc-300">
                  <strong>Confluence Analysis:</strong> Pola <strong>{pattern}</strong> selesai terbentuk di Point D. 
                  {isBullish
                    ? ' Hal ini mengonfirmasi zona pembalikan arah naik (PRZ) yang sejajar dengan ketidakseimbangan sentimen retail yang sedang shorting. Sinyal beli terkonfirmasi.'
                    : ' Hal ini mengonfirmasi zona pembalikan arah turun (PRZ) yang sejajar dengan ketidakseimbangan sentimen retail yang sedang melakukan pembelian. Sinyal jual terkonfirmasi.'
                  }
                </div>

                {/* Timeframe Accuracy Rating / Alert */}
                <div class="mt-3 text-[11px] leading-relaxed">
                  {(() => {
                    const tf = timeframe || 'H1';
                    
                    if (tf === 'M1' || tf === 'M5' || tf === 'M15') {
                      return (
                        <div class="rounded-lg border border-red-500/20 bg-red-950/10 p-2.5 text-red-400">
                          <strong class="text-red-400 block uppercase mb-1">⚠️ Akurasi Sangat Rendah (TF {tf})</strong>
                          Sistem mendeteksi pola di Timeframe Rendah (M1-M15). Spread/slippage mengambil porsi besar dari panjang leg, dan swing point sering kali berupa stop-hunt alogaritma, bukan pergeseran supply-demand riil. Gunakan TF ini <strong>hanya untuk mencari konfirmasi entri Stochastic/BB</strong> yang tajam setelah zona PRZ dihitung dari H1-H4.
                        </div>
                      );
                    } else if (tf === 'M30' || tf === 'H1') {
                      return (
                        <div class="rounded-lg border border-orange-500/20 bg-orange-950/10 p-2.5 text-orange-400">
                          <strong class="text-orange-400 block uppercase mb-1">⚠️ TF Menengah / Butuh Konfirmasi (TF {tf})</strong>
                          Sinyal mulai layak{isSharkOrCypher ? ' (Shark/Cypher lebih toleran terhadap intraday)' : ''}, tetapi pola rentan invalid oleh 1-2 candle noise. Wajib mencari konfirmasi tambahan seperti divergence Stochastic/RSI dan pola candlestick (pinbar/engulfing) di area PRZ.
                        </div>
                      );
                    } else if (tf === 'H4') {
                      return (
                        <div class="rounded-lg border border-green-500/20 bg-green-950/10 p-2.5 text-green-400">
                          <strong class="text-green-400 block uppercase mb-1">✨ Sweet Spot Harmonic (TF {tf})</strong>
                          Titik ideal terbaik! Swing point merepresentasikan sesi trading institusional yang bersih dari noise acak. Akurasi geometri Fibonacci berada pada level optimum dengan kuantitas setup reguler.
                        </div>
                      );
                    } else {
                      return (
                        <div class="rounded-lg border border-emerald-500/20 bg-emerald-950/10 p-2.5 text-emerald-400">
                          <strong class="text-emerald-400 block uppercase mb-1">💎 Akurasi Maksimal (TF {tf})</strong>
                          Presisi geometri tertinggi dengan tingkat noise terendah. Pola sangat valid, namun membutuhkan waktu berminggu-minggu untuk terbentuk sempurna. Setup ini sangat berharga.
                        </div>
                      );
                    }
                  })()}
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ====================================================
    // Trend-Following (Non-Contrarian) Playbook Sub-Component
    // ====================================================
    function TrendFollowingPlaybook({ asset }) {
      const indicators = asset.indicators || {};
      const rsi = indicators.rsi !== undefined ? indicators.rsi : 50;
      const sma20 = indicators.sma20 !== undefined ? indicators.sma20 : asset.price;
      const isBullish = rsi > 50 && asset.price > sma20;
      let direction = 'BULLISH TREND';
      let commentary = '';
      let styleClass = 'border-green-500/25 bg-green-500/[0.03]';

      if (isBullish) {
        direction = 'BULLISH TREND (Trend-Following)';
        commentary = `Harga berada di atas rata-rata pergerakan harian (SMA 20) dan RSI (${rsi}) berada di wilayah bullish (>50). Momentum pembeli mendominasi struktur pasar. Sinyal non-contrarian merekomendasikan untuk mengikuti tren naik utama (Buy Strength) dengan menargetkan area resisten berikutnya.`;
        styleClass = 'border-green-500/25 bg-green-500/[0.03]';
      } else {
        direction = 'BEARISH TREND (Trend-Following)';
        commentary = `Harga ditransaksikan di bawah SMA 20 dan RSI (${rsi}) berada di wilayah bearish (<50). Tren utama didominasi oleh penjual. Sinyal non-contrarian merekomendasikan untuk mengikuti momentum penurunan utama (Sell Rallies) untuk menargetkan level support terendah berikutnya.`;
        styleClass = 'border-red-500/25 bg-red-500/[0.03]';
      }

      return (
        <div class={`rounded-2xl border p-5 ${styleClass}`}>
          <h4 class="text-xs font-bold uppercase tracking-wider text-green-400 font-heading">Non-Contrarian Signal</h4>
          <div class="mt-3">
            <span class="text-[10px] text-zinc-500 uppercase font-mono">Trend Direction</span>
            <p class="text-sm font-bold text-white mt-0.5">{direction}</p>
          </div>
          <div class="mt-2">
            <span class="text-[10px] text-zinc-500 uppercase font-mono">Rencana Analisis Tren</span>
            <p class="text-xs text-zinc-300 mt-1 leading-relaxed font-sans">{commentary}</p>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
